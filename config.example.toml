# DevEco2API 配置文件
# 首次运行时，请按终端提示完成华为账号登录，token 会自动回写至此文件。

[server]
host = "127.0.0.1"
port = 10102
# 访问本 OpenAI 兼容 API 所需的密钥，客户端请求时放在 Authorization: Bearer <api_key>
api_key = "sk-deveco2api"

[deveco]
base_url = "https://cn.devecostudio.huawei.com"
auth_url = "console/DevEcoIDE/apply"
temp_token_check_url = "authrouter/auth/api/temptoken/check"
jwt_token_check_url = "authrouter/auth/api/jwToken/check"
app_id = "1008"
# 本地浏览器回调监听端口（需与登录 URL 中的 port 一致）
callback_port = 10101
# 默认使用模型，可通过 /v1/models 查看可用模型
model = "GLM-5.1"
client = "cli"
project = "global"
user_agent = "deveco/0.1.0 ai-sdk/provider-utils/4.0.23 runtime/bun/1.3.14"

[deveco.auth]
# 登录成功后由程序自动写入，无需手动填写
jwt_token = ""
access_token = ""
refresh_token = ""
user_id = ""
user_name = ""

[logging]
level = "INFO"
